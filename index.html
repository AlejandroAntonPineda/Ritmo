<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Musikspaß für Kinder 🎵</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --app-bg: #ffffff;
            --text-color: #2d3436;
            --primary-color: #ff6b6b;
            --primary-shadow: #d63031;
            --accent-color: #00cec9;
            --accent-shadow: #00b894;
            --download-color: #6c5ce7;
            --download-shadow: #4834d4;
            --clear-color: #b2bec3;
            --clear-shadow: #636e72;
            --highlight-color: #ffeaa7;
            --track-bg: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--app-bg);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5em;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .instrucciones {
            font-size: 1.1em;
            color: #636e72;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .botones-paleta {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-nota {
            background-color: white;
            border: 3px solid var(--accent-color);
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140px;
            box-shadow: 0 8px 0 var(--accent-shadow);
            transition: all 0.1s ease;
        }

        .btn-nota:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--accent-shadow);
        }

        .btn-nota img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .btn-nota span {
            font-weight: 800;
            font-size: 13px;
            line-height: 1.2;
            color: var(--text-color);
        }

        #secuencia-container {
            background: var(--track-bg);
            backdrop-filter: blur(10px);
            min-height: 130px;
            border: 3px dashed #74b9ff;
            border-radius: 25px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nota-en-secuencia {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nota-en-secuencia img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .nota-activa {
            background-color: var(--highlight-color);
            border: 3px solid #fdcb6e;
            transform: scale(1.1);
            z-index: 10;
        }

        .controles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn-control {
            font-size: 1.2em;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            color: white;
            transition: all 0.1s ease;
        }

        .btn-play { background-color: var(--primary-color); box-shadow: 0 8px 0 var(--primary-shadow); }
        .btn-clear { background-color: var(--clear-color); box-shadow: 0 8px 0 var(--clear-shadow); }
        .btn-play:active, .btn-clear:active { transform: translateY(8px); box-shadow: 0 0px 0 transparent; }

        /* Estilos de la sección de descarga */
        .seccion-descarga {
            background-color: #f1f2f6;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            border: 2px dashed #a4b0be;
        }

        .seccion-descarga p {
            font-size: 1.1em;
            color: #2f3542;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .botones-descarga-individual {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-download-single {
            background-color: var(--download-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 1em;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--download-shadow);
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download-single:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 transparent;
        }

    </style>
</head>
<body>

    <main class="app-container">
        <header>
            <h1>✨ Lass uns Musik machen! ✨</h1>
            <p class="instrucciones">Klicke auf die Bilder, um deine Rhythmus-Sequenz zu bauen!</p>
        </header>

        <section class="botones-paleta">
            <button class="btn-nota" onclick="agregarNota('aplauso')">
                <img src="Palmada - negra.jpeg" alt="Klatschen" onerror="this.src='https://via.placeholder.com/80?text=👏'">
                <span>Klatschen<br>(Viertelnote)</span>
            </button>
            <button class="btn-nota" onclick="agregarNota('pisada')">
                <img src="Pie- corcheas.jpeg" alt="Stampfen" onerror="this.src='https://via.placeholder.com/80?text=👣'">
                <span>Stampfen<br>(Achtelnoten)</span>
            </button>
            <button class="btn-nota" onclick="agregarNota('silencio')">
                <img src="Gato - silencio.jpeg" alt="Stille" onerror="this.src='https://via.placeholder.com/80?text=🤫'">
                <span>Katze<br>(Pssst!)</span>
            </button>
        </section>

        <section id="secuencia-container">
        </section>

        <section class="controles">
            <button class="btn-control btn-play" onclick="reproducirSecuencia()">▶️ Abspielen</button>
            <button class="btn-control btn-clear" onclick="limpiarSecuencia()">🗑️ Löschen</button>
        </section>

        <hr style="border: 0; height: 1px; background-color: #dfe4ea; margin: 30px 0;">

        <section class="seccion-descarga">
            <p>🖨️ Hier kannst du die Figuren herunterladen, um im echten Leben zu spielen!</p>
            <div class="botones-descarga-individual">
                <button class="btn-download-single" onclick="descargarImagen('Palmada - negra.jpeg', 'Klatschen.jpeg')">
                    📥 Klatschen
                </button>
                <button class="btn-download-single" onclick="descargarImagen('Pie- corcheas.jpeg', 'Stampfen.jpeg')">
                    📥 Stampfen
                </button>
                <button class="btn-download-single" onclick="descargarImagen('Gato - silencio.jpeg', 'Katze_Stille.jpeg')">
                    📥 Katze
                </button>
            </div>
        </section>

    </main>

    <script>
        let secuencia = [];
        const BPM = 60; 
        const tiempoPorBeat = (60 / BPM) * 1000;
        let audioCtx;

        const imagenes = {
            aplauso: 'Palmada - negra.jpeg',
            pisada: 'Pie- corcheas.jpeg',
            silencio: 'Gato - silencio.jpeg'
        };

        const emojisFallback = { aplauso: '👏', pisada: '👣', silencio: '🤫' };

        // Función de descarga segura (no quita el juego)
        function descargarImagen(url, nombreArchivo) {
            const link = document.createElement('a');
            link.href = url;
            link.download = nombreArchivo;
            link.target = '_blank'; // Esto asegura que, en el peor de los casos, se abra en otra pestaña sin cerrar el juego
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function iniciarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function agregarNota(tipo) {
            secuencia.push(tipo);
            actualizarPantalla();
        }

        function limpiarSecuencia() {
            secuencia = [];
            actualizarPantalla();
        }

        function actualizarPantalla() {
            const contenedor = document.getElementById('secuencia-container');
            contenedor.innerHTML = '';
            secuencia.forEach((nota) => {
                const div = document.createElement('div');
                div.className = 'nota-en-secuencia';
                const img = document.createElement('img');
                img.src = imagenes[nota];
                img.onerror = () => img.src = `https://via.placeholder.com/80?text=${emojisFallback[nota]}`;
                div.appendChild(img);
                contenedor.appendChild(div);
            });
        }

        function crearRuidoBlanco(duracion) {
            const bufferSize = audioCtx.sampleRate * duracion;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            return noise;
        }

        function sonidoAplauso(tiempo) {
            const noise = crearRuidoBlanco(0.1);
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            filter.type = 'bandpass'; filter.frequency.setValueAtTime(1200, tiempo);
            gain.gain.setValueAtTime(0.8, tiempo);
            gain.gain.exponentialRampToValueAtTime(0.01, tiempo + 0.1);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(tiempo);
        }

        function sonidoPisada(tiempo) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(150, tiempo);
            osc.frequency.exponentialRampToValueAtTime(0.01, tiempo + 0.15);
            gain.gain.setValueAtTime(1, tiempo);
            gain.gain.exponentialRampToValueAtTime(0.001, tiempo + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(tiempo); osc.stop(tiempo + 0.15);
        }

        function sonidoSilencio(tiempo) {
            const noise = crearRuidoBlanco(0.3);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, tiempo);
            gain.gain.linearRampToValueAtTime(0.2, tiempo + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, tiempo + 0.3);
            noise.connect(gain); gain.connect(audioCtx.destination);
            noise.start(tiempo);
        }

        async function reproducirSecuencia() {
            if (secuencia.length === 0) return;
            iniciarAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const elementosDOM = document.querySelectorAll('.nota-en-secuencia');
            const tiempoInicio = audioCtx.currentTime + 0.1;

            secuencia.forEach((nota, index) => {
                const tiempoBeat = tiempoInicio + (index * (tiempoPorBeat / 1000));
                
                setTimeout(() => {
                    elementosDOM.forEach(el => el.classList.remove('nota-activa'));
                    if(elementosDOM[index]) elementosDOM[index].classList.add('nota-activa');
                }, index * tiempoPorBeat);

                if (nota === 'aplauso') sonidoAplauso(tiempoBeat);
                else if (nota === 'pisada') {
                    sonidoPisada(tiempoBeat); 
                    sonidoPisada(tiempoBeat + (tiempoPorBeat / 2000)); 
                }
                else if (nota === 'silencio') sonidoSilencio(tiempoBeat);
            });

            setTimeout(() => {
                elementosDOM.forEach(el => el.classList.remove('nota-activa'));
            }, secuencia.length * tiempoPorBeat);
        }
    </script>
</body>
</html>
